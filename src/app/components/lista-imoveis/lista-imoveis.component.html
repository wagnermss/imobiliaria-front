<div style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
  <h2 style="color: #374151; margin-top: 0; margin-bottom: 1.5rem; font-size: 1.8rem;">
      Catálogo de Imóveis
  </h2>

  <p-table [value]="imoveis" [tableStyle]="{ 'min-width': '50rem' }" styleClass="p-datatable-striped">
      
      <ng-template pTemplate="header">
          <tr>
              <th style="color: #4b5563;">Título</th>
              <th style="color: #4b5563;">Endereço</th>
              <th style="color: #4b5563;">Bairro</th>
              <th style="color: #4b5563;">Zona</th>
              <th style="color: #4b5563;">Valor</th>
              
          </tr>
      </ng-template>
      
      <ng-template pTemplate="body" let-imovel>
          <tr>
              <td style="font-weight: 500;">{{ imovel.titulo }}</td>
              <td>{{ imovel.endereco }}</td>
              <td>{{ imovel.bairro }}</td>
              <td><span style="background: #e5e7eb; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem;">{{ imovel.zona }}</span></td>
              <td style="color: #22c55e; font-weight: bold;">{{ imovel.valor | currency:'BRL' }}</td>
              
              <td style="display: flex; gap: 0.5rem; justify-content: center;">
                  <p-button icon="pi pi-pencil" [rounded]="true" severity="success" [outlined]="true" [routerLink]="['/editar', imovel.id]"></p-button>
                  <p-button icon="pi pi-trash" [rounded]="true" severity="danger" [outlined]="true" (onClick)="excluir(imovel.id)"></p-button>
              </td>
          </tr>
      </ng-template>
      
      <ng-template pTemplate="emptymessage">
          <tr>
              <td colspan="6" style="text-align: center; padding: 2rem; color: #6b7280;">
                  <i class="pi pi-inbox" style="font-size: 2rem; margin-bottom: 10px; color: #9ca3af; display: block;"></i>
                  Nenhum imóvel cadastrado no momento.
              </td>
          </tr>
      </ng-template>
  </p-table>
</div>
