<form
  [formGroup]="loginForm"
  (ngSubmit)="fazerLogin()"
  novalidate
  style="max-width: 400px; margin: 80px auto; padding: 30px; border: 1px solid #ccc; border-radius: 8px; background-color: #f9f9f9; box-shadow: 0 4px 8px rgba(0,0,0,0.1);"
>
  <h2 style="text-align: center; color: #333; margin-bottom: 20px;">Acessar Sistema</h2>

  <div style="display: flex; flex-direction: column; gap: 15px;">
    <div style="display: flex; flex-direction: column; gap: 6px;">
      <label style="font-weight: bold;">E-mail:</label>
      <input
        type="email"
        formControlName="email"
        required
        placeholder="Seu e-mail"
        (input)="clearFieldError('email')"
        style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;"
      >
      <small *ngIf="getErrorMessage('email') as erro" style="color: #dc2626;">{{ erro }}</small>
    </div>

    <div style="display: flex; flex-direction: column; gap: 6px;">
      <label style="font-weight: bold;">Senha:</label>
      <input
        type="password"
        formControlName="senha"
        required
        placeholder="Sua senha"
        (input)="clearFieldError('senha')"
        style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;"
      >
      <small *ngIf="getErrorMessage('senha') as erro" style="color: #dc2626;">{{ erro }}</small>
    </div>

    <small *ngIf="mensagemErroGeral" style="color: #dc2626;">{{ mensagemErroGeral }}</small>

    <button
      type="submit"
      [disabled]="isSubmitting"
      style="background-color: #3c7abc; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px;"
    >
      {{ isSubmitting ? 'Entrando...' : 'Entrar' }}
    </button>

    <div style="text-align: center; margin-top: 15px;">
      <span style="color: #555;">Não tem uma conta? </span>
      <a routerLink="/cadastro-usuario" style="color: #3c7abc; font-weight: bold; text-decoration: none; cursor: pointer;">Cadastre-se</a>
    </div>
  </div>
</form>
