<ng-container *ngIf="showShell; else publicRoutes">
  <div class="app-shell">
    <p-drawer
      [(visible)]="sidebarVisible"
      position="left"
      [modal]="true"
      [dismissible]="true"
      [style]="drawerStyle"
      class="app-drawer"
    >
      <ng-template pTemplate="header">
        <div class="drawer-brand">
          <p-avatar icon="pi pi-home" shape="circle" size="large" styleClass="drawer-brand-avatar"></p-avatar>
          <div class="drawer-brand-copy">
            <strong>Imobiliária</strong>
            <span>Painel administrativo</span>
          </div>
        </div>
      </ng-template>

      <div class="drawer-body">
        <p-card class="drawer-summary-card">
          <ng-template pTemplate="title">{{ usuarioNome }}</ng-template>
          <ng-template pTemplate="subtitle">{{ usuarioEmail }}</ng-template>
          <p class="drawer-summary-text">
            Acesse rapidamente o catálogo e o cadastro de imóveis.
          </p>
        </p-card>

        <p-divider></p-divider>

        <p-menu [model]="navigationItems" class="drawer-nav-menu"></p-menu>
      </div>
    </p-drawer>

    <div class="main-panel">
      <p-toolbar class="app-toolbar">
        <ng-template pTemplate="start">
          <div class="toolbar-start">
            <p-button
              icon="pi pi-bars"
              severity="contrast"
              [rounded]="true"
              [text]="true"
              ariaLabel="Abrir menu"
              (onClick)="toggleSidebar()"
            ></p-button>

            <div class="toolbar-title-group">
              <span class="toolbar-eyebrow">Painel</span>
              <h1>{{ currentSectionTitle }}</h1>
            </div>
          </div>
        </ng-template>

        <ng-template pTemplate="end">
          <div class="toolbar-end">
            <button
              pButton
              type="button"
              severity="secondary"
              [text]="true"
              class="account-trigger"
              (click)="accountMenu.toggle($event)"
            >
              <span class="account-trigger-content">
                <p-avatar [label]="usuarioInicial" shape="circle" styleClass="account-avatar"></p-avatar>
                <span class="account-trigger-meta">
                  <small>Minha Conta</small>
                  <strong>{{ usuarioNome }}</strong>
                </span>
                <i class="pi pi-angle-down"></i>
              </span>
            </button>

            <p-menu
              #accountMenu
              [model]="accountMenuItems"
              [popup]="true"
              appendTo="body"
              class="account-popup-menu"
            ></p-menu>

            <p-button
              label="Sair"
              icon="pi pi-sign-out"
              severity="danger"
              [outlined]="true"
              (onClick)="logout()"
            ></p-button>
          </div>
        </ng-template>
      </p-toolbar>

      <main class="content-area">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-container>

<ng-template #publicRoutes>
  <router-outlet></router-outlet>
</ng-template>
